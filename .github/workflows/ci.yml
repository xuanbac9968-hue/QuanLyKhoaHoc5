.mv{{font-weight:700;color:#0052cc}}.gv{{font-weight:700;color:#00875a}}.rv{{font-weight:700;color:#c62828}}
.full{{grid-column:1/-1}}
table{{width:100%;border-collapse:collapse;font-size:12px}}
th{{background:#f0f4f8;padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:#5e7087}}
td{{padding:7px 10px;border-bottom:1px solid #f5f7fa}}
.pass{{color:#00875a;font-weight:700}}.fail{{color:#c62828;font-weight:700}}.warn{{color:#e65100}}
footer{{text-align:center;padding:20px;color:#999;font-size:11px}}
</style></head><body>
<div class="hdr">
  <h1>📊 CI/CD Pipeline Report – QuanLyKhoaHoc5</h1>
  <p>Trung tâm Ngoại ngữ NNL | ASP.NET Core MVC .NET 10 | GitHub Actions</p>
  <div class="meta">
