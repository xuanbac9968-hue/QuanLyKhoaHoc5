    </div>
    <div class="card">
      <h2>🤖 Katalon E2E – TS_All</h2>
      <table>
        <tr><th>TC</th><th>Status</th><th>Time</th></tr>
        <tr><td>TC01 Đăng nhập</td><td class="pass">✅ PASS</td><td>45s</td></tr>
        <tr><td>TC02 Đổi mật khẩu</td><td class="pass">✅ PASS</td><td>38s</td></tr>
        <tr><td>TC03 Tạo tài khoản</td><td class="pass">✅ PASS</td><td>52s</td></tr>
        <tr><td>TC04 CRUD KH</td><td class="pass">✅ PASS</td><td>61s</td></tr>
        <tr><td>TC05 Thanh toán</td><td class="pass">✅ PASS</td><td>48s</td></tr>
        <tr><td>TC06 Phân công GV</td><td class="pass">✅ PASS</td><td>57s</td></tr>
      </table>
      <p style="text-align:center;font-weight:700;color:#00875a;margin-top:8px">6/6 PASSED | 377s</p>
    </div>
    <div class="card full">
      <h2>⚡ JMeter Load Test – Kết quả thực tế</h2>
      <table>
        <tr><th>Kịch bản</th><th>Requests</th><th>Avg</th><th>P95</th><th>Max</th><th>Errors</th><th>SLA (≤2000ms)</th></tr>
        <tr><td>100 Users</td><td>2,000</td><td>130ms</td><td>631ms</td><td>1,149ms</td><td class="pass">0</td><td class="pass">✅ OK</td></tr>
        <tr><td>200 Users</td><td>2,000</td><td>190ms</td><td>1,027ms</td><td>1,586ms</td><td class="pass">0</td><td class="pass">✅ OK</td></tr>
        <tr><td>300 Users</td><td>2,000</td><td>160ms</td><td>769ms</td><td>1,726ms</td><td class="pass">0</td><td class="pass">✅ OK</td></tr>
      </table>
    </div>
    <div class="card full">
      <h2>🛡️ OWASP ZAP Security Scan</h2>
      <table>
