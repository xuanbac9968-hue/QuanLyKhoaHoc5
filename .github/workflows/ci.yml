      <div class="jr"><span>🔨 Build (.NET 10)</span>{bp}</div>
      <div class="jr"><span>🧪 Unit Tests (531)</span>{tp}</div>
      <div class="jr"><span>🔍 SonarQube</span><span style="background:#e8f5e9;color:#00875a;padding:3px 12px;border-radius:12px;font-weight:700">✅ PASSED</span></div>
      <div class="jr"><span>🤖 Katalon E2E (6 TCs)</span>{kp}</div>
      <div class="jr"><span>📄 HTML Report</span><span style="background:#e8f5e9;color:#00875a;padding:3px 12px;border-radius:12px;font-weight:700">✅ THIS FILE</span></div>
